name: Daily Update

on:
  # 1. 定时运行：每天北京时间早上 8:00 (UTC 0:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 2. 手动运行：允许你在 GitHub 页面上点击按钮触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 建议使用 v3 或 v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python bot.py

      - name: Inject Secret Password
        run: |
          # 使用 @ 作为定界符，防止密码里有斜杠导致报错
          # 同时添加双引号确保字符串处理正确
          sed -i 's@REPLACE_ME_PASSWORD@${{ secrets.SITE_PASSWORD }}@g' index.html
          
          # 调试检查（可选）：这行代码会打印出 index.html 包含密码的那一行
          # 但为了安全，GitHub 会自动把密码显示为 ***，你能看到 *** 就说明替换成功了
          grep "const PASSWORD =" index.html

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # 2. 添加 index.html 和整个 news-reports 文件夹的内容
          git add index.html news-reports/
          
          # 3. 只有在有变动时才提交，防止因为没有文件变动而报错
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily content and image update $(date +'%Y-%m-%d')"
            git push
          fi