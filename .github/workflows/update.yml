name: Daily Update

on:
  # 1. 定时运行：每天北京时间早上 8:00 (UTC 0:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 2. 手动运行：允许你在 GitHub 页面上点击按钮触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3 # 建议使用 v3 或 v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python bot.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          # 添加 index.html 和 imgs 文件夹
          git add index.html imgs/*
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily content and image update" && git push)